<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>貪吃蛇學文法：Simple Future Tense (SVOPT)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', 'Nunito', sans-serif;
            touch-action: none; /* 禁用瀏覽器預設的觸控手勢 (縮放、平移) */
            overscroll-behavior: none; /* 防止邊緣回彈/下拉刷新效應 */
            -webkit-user-select: none; /* 禁用文字反白 (防止長按選取) */
            user-select: none;
            -webkit-touch-callout: none; /* 禁用長按彈出選單 */
        }
        canvas {
            background-color: #a7f3d0;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s;
        }
        .dpad-btn:active {
            transform: scale(0.9);
            background-color: #e5e7eb;
        }
        .sentence-box {
            min-height: 3.5rem;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px) rotate(-1deg); }
            20%, 40%, 60%, 80% { transform: translateX(4px) rotate(1deg); }
        }
        .shake-animation {
            animation: shake 0.4s ease-in-out infinite;
        }
        #overlay {
            z-index: 100;
        }
    </style>
</head>
<body class="bg-blue-50 h-screen w-screen flex flex-col items-center overflow-hidden relative">

<script>
    // --- 修正 iPad/iOS 畫面位移與放大問題 ---
    // 1. 防止畫面上下滑動與橡皮筋效應 (Bouncing)
    document.addEventListener('touchmove', function(e) {
        e.preventDefault();
    }, { passive: false });

    // 2. 防止雙擊螢幕時畫面忽然放大
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
        let now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
            event.preventDefault();
        }
        lastTouchEnd = now;
    }, { passive: false });

    // --- 題庫區 ---

        { words: ["My", "mother", "will", "buy", "some", "fruit", "at the market", "tomorrow", "."], struct: ["My mother", "will buy", "some fruit", "at the market", "tomorrow"] },
        { words: ["She", "will", "dance", "on the stage", "tonight", "."], struct: ["She", "will dance", "-", "on the stage", "tonight"] },
        { words: ["We", "will", "play", "football", "at school", "on Monday", "."], struct: ["We", "will play", "football", "at school", "on Monday"] },
        { words: ["She", "will", "drink", "tea", "in the cafe", "tomorrow morning", "."], struct: ["She", "will drink", "tea", "in the cafe", "tomorrow morning"] }

    let sentences = [];
    let sentenceStructures = [];

    // 隨機抽題函數
    function setupRandomLevels() {
        const getRandomItems = (arr, n) => [...arr].sort(() => 0.5 - Math.random()).slice(0, n);
        
        // 抽取：2題SVO + 2題SVOP + 2題SVOPT = 6題
        const selected = [
            ...getRandomItems(poolSVO, 2),
            ...getRandomItems(poolSVOP, 2),
            ...getRandomItems(poolSVOPT, 2)
        ];
        
        sentences = selected.map(item => item.words);
        sentenceStructures = selected.map(item => item.struct);
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const GRID_SIZE = 15; 
    const CELL_SIZE = canvas.width / GRID_SIZE; 
    const GAME_SPEED = 400; 

    let snake = [];
    let dx = 0, dy = 0, nextDx = 0, nextDy = 0;
    let currentLevel = 0, targetWordIndex = 0, wordsOnBoard = [];
    let score = 0, mistakesCount = 0, gameLoop, isPlaying = false;
    let isDizzy = false, dizzyTimeout, timeElapsed = 0, timerInterval;

    const bgm = document.getElementById('bgm');
    // 移除了 bgmToggle
    bgm.volume = 0.5; // 提高音量至 50% 確保清楚聽見

    const scoreDisplay = document.getElementById('scoreDisplay');
    const timeDisplay = document.getElementById('timeDisplay');
    const sentenceDisplay = document.getElementById('sentenceDisplay');
    const targetHint = document.getElementById('targetHint');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayMessage = document.getElementById('overlayMessage');
    const overlayBtn = document.getElementById('overlayBtn');

    // --- 全新加入：即時合成按鈕點擊音效 (無延遲、無須下載) ---
    let audioCtx = null;
    function initAudioCtx() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playClickSound() {
        try {
            initAudioCtx();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // 設定聲音類型與頻率變化 (製造出短促清脆的 "Pop" 聲)
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            
            // 設定音量變化 (瞬間大聲然後極速衰減)
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } catch(e) { 
            console.log("播放按鈕音效失敗", e); 
        }
    }

    // 將點擊音效綁定到所有的過場按鈕上（包含下一步、開始遊戲、下一關等）
    overlayBtn.addEventListener('click', playClickSound);
    // ----------------------------------------------------

    // --- 全新加入：單字發音 (Speech Synthesis) ---
    let preferredVoice = null;
    function loadVoice() {
        if (!window.speechSynthesis) return;
        const voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) return;

        const maleVoiceKeywords = ['David', 'Daniel', 'Alex', 'Fred', 'Arthur', 'Male', 'James'];
        for (let voice of voices) {
            if (voice.lang.includes('en') && maleVoiceKeywords.some(keyword => voice.name.includes(keyword))) {
                preferredVoice = voice;
                break;
            }
        }
        if (!preferredVoice) {
            preferredVoice = voices.find(v => v.lang.includes('en'));
        }
    }
    
    if (window.speechSynthesis) {
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoice;
        }
        loadVoice();
    }

    function speakWord(text) {
        if (!window.speechSynthesis) return;
        
        // 過濾掉標點符號，讓單字獨立發音時更自然
        const cleanText = text.replace(/[\.\?\!]/g, '');
        if (!cleanText.trim()) return;

        window.speechSynthesis.resume(); // 強制喚醒 iOS 語音引擎
        window.speechSynthesis.cancel(); // 中斷前一個正在唸的字
        
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'en-US';
        if (preferredVoice) utterance.voice = preferredVoice;
        utterance.rate = 0.8; // 速度微調，聽起來清晰
        window.speechSynthesis.speak(utterance);
    }

    // --- 修改：整句發音 (支援回呼函數，並加入防當機保險機制) ---
    function speakSentence(text, onEndCallback) {
        if (!window.speechSynthesis) {
            if (onEndCallback) setTimeout(onEndCallback, 2000);
            return;
        }
        
        window.speechSynthesis.resume(); 
        window.speechSynthesis.cancel(); 
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        if (preferredVoice) utterance.voice = preferredVoice;
        utterance.rate = 0.75; // 唸整句時稍微放慢一點點，讓學生聽得更清楚
        
        if (onEndCallback) {
            let called = false;
            const safeCallback = () => {
                if (!called) {
                    called = true;
                    onEndCallback();
                }
            };
            utterance.onend = safeCallback;
            utterance.onerror = safeCallback;
            
            // 蘋果 iOS 系統的語音 API 有時不會觸發 onend 事件
            // 這裡加入一個保險機制，根據字串長度估算最長播放時間，時間到強制觸發下一步，避免卡關
            const fallbackTime = Math.max(2000, text.length * 150) + 1000;
            setTimeout(safeCallback, fallbackTime);
        }

        window.speechSynthesis.speak(utterance);
    }
    // ----------------------------------------------------

    // 【全域音樂與語音解鎖器】確保蘋果設備能正常發出聲音
    let isAudioUnlocked = false;
    function unlockAllAudio() {
        if (isAudioUnlocked) return;

        initAudioCtx(); // 確保蘋果設備在第一次點擊時，成功喚醒按鈕音效引擎

        // 1. 強制解鎖背景音樂
        if (bgm.paused) {
            bgm.volume = 0.5;
            let playPromise = bgm.play();
            if (playPromise !== undefined) {
                playPromise.catch(e => console.log("音樂解鎖等待中...", e));
            }
        }

        // 2. 解鎖語音引擎
        if (window.speechSynthesis) {
            window.speechSynthesis.resume();
            const silentUtterance = new SpeechSynthesisUtterance(' ');
            if (preferredVoice) silentUtterance.voice = preferredVoice;
            silentUtterance.volume = 0.01;
            window.speechSynthesis.speak(silentUtterance);
        }

        isAudioUnlocked = true;
        // 解鎖成功後，移除全域監聽器，節省資源
        document.body.removeEventListener('click', unlockAllAudio);
        document.body.removeEventListener('touchstart', unlockAllAudio);
    }

    // 監聽所有點擊與觸控來觸發解鎖 (第一次點擊畫面任何地方就觸發)
    document.body.addEventListener('click', unlockAllAudio);
    document.body.addEventListener('touchstart', unlockAllAudio, {passive: true});


    function showIntroPage1() {
        // 確保每次回到首頁（包含重新開始遊戲）時，徹底歸零所有分數與時間狀態
        currentLevel = 0;
        score = 0;
        mistakesCount = 0;
        timeElapsed = 0;
        
        // 同步更新右上角的 UI 顯示
        if (scoreDisplay) scoreDisplay.textContent = "0";
        if (timeDisplay) timeDisplay.textContent = "00:00";
        
        // 每次打開遊戲或重新開始時，重新隨機生成關卡題目
        setupRandomLevels();
        
        overlayTitle.textContent = "準備好學習了嗎？";
        overlayTitle.className = "text-4xl font-bold text-yellow-400 mb-6";
        overlayMessage.innerHTML = `

                <p class="text-xl font-bold mb-4">玩法：</p>
                <p class="mb-2">控制貪吃蛇，按順序吃下正確的單字，</p>

            </div>
            <p class="text-sm text-slate-300 italic">準備好了嗎？讓我們開始挑戰！</p>
        `;
        overlayBtn.innerHTML = "下一步 Next";
        overlayBtn.onclick = () => {
            unlockAllAudio(); // 確保點擊按鈕時徹底解鎖音訊
            showIntroPage2();

    }

                <div class="flex flex-wrap justify-center items-center gap-x-4 gap-y-12 max-w-4xl px-4">
                    <!-- S -->

                        <div class="text-6xl sm:text-7xl font-black text-green-400 mb-2 drop-shadow-[0_2px_2px_rgba(0,0,0,0.5)]">S</div>

                    </div>
                    
                    <div class="text-4xl font-bold text-yellow-400 self-center pb-12">+</div>
                    
                    <!-- O -->

    function startReadyCountdown() {
        overlay.classList.add('hidden');
        initLevel();
        draw();
        const container = canvas.parentElement;
        let msgDiv = document.createElement('div');
        msgDiv.className = 'absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-blue-500/90 text-white font-bold w-32 h-32 flex justify-center items-center rounded-full z-50 text-7xl shadow-2xl';
        container.appendChild(msgDiv);
        let count = 3;
        const timer = setInterval(() => {
            if (count > 0) {
                msgDiv.innerHTML = count;
                count--;
            } else if (count === 0) {
                msgDiv.innerHTML = "GO!";
                count--;
            } else {
                clearInterval(timer);
                msgDiv.remove();
                startGame();
            }
        }, 1000);
    }

    function initLevel() {
        snake = [
            {x: Math.floor(GRID_SIZE/2), y: Math.floor(GRID_SIZE/2)},
            {x: Math.floor(GRID_SIZE/2)-1, y: Math.floor(GRID_SIZE/2)},
            {x: Math.floor(GRID_SIZE/2)-2, y: Math.floor(GRID_SIZE/2)}
        ];
        dx = 1; dy = 0; nextDx = 1; nextDy = 0;
        targetWordIndex = 0; wordsOnBoard = [];
        isDizzy = false;
        if (dizzyTimeout) clearTimeout(dizzyTimeout);
        canvas.classList.remove('shake-animation');
        const oldMsg = document.getElementById('dizzyMsg');
        if (oldMsg) oldMsg.remove();
        spawnWords();
        updateSentenceUI();
    }

    function spawnWords() {
        const sentence = sentences[currentLevel];
        ctx.font = 'bold 18px "Nunito"';
        sentence.forEach(word => {
            const textWidth = ctx.measureText(word).width;
            const span = Math.max(1, Math.ceil((textWidth + 24) / CELL_SIZE));
            let pos, isValidPos = false, attempts = 0;
            while (!isValidPos && attempts < 300) {
                pos = { 
                    x: Math.floor(Math.random() * (GRID_SIZE - span)), 
                    y: Math.floor(Math.random() * (GRID_SIZE - 2)) + 1 
                };
                let overlap = false;
                for (let seg of snake) {
                    if (seg.y === pos.y && seg.x >= pos.x && seg.x < pos.x + span) { overlap = true; break; }
                }
                if (!overlap) {
                    for (let w of wordsOnBoard) {
                        let xOverlap = !(pos.x + span + 1 <= w.x || pos.x >= w.x + w.span + 1);
                        let yOverlap = Math.abs(w.y - pos.y) <= 1;
                        if (xOverlap && yOverlap) { overlap = true; break; }
                    }
                }
                if (!overlap) isValidPos = true;
                attempts++;
            }
            wordsOnBoard.push({ word: word, x: pos.x, y: pos.y, span: span });
        });
    }

    function updateSentenceUI() {
        const sentence = sentences[currentLevel];
        sentenceDisplay.innerHTML = '';
        sentence.forEach((word, index) => {
            const span = document.createElement('span');
            if (index < targetWordIndex) {
                span.className = 'text-blue-600 border-b-2 border-blue-600 px-1';
                span.textContent = word;
            } else if (index === targetWordIndex) {
                span.className = 'text-slate-300 border-b-2 border-slate-300 px-1 border-dashed inline-block min-w-[3rem] text-center';
                span.textContent = '___';
            } else {
                span.className = 'text-transparent border-b-2 border-slate-200 px-1 inline-block min-w-[2rem]';
                span.textContent = word; 
            }
            sentenceDisplay.appendChild(span);
        });
        targetHint.textContent = targetWordIndex < sentence.length ? `目標詞： ${sentence[targetWordIndex]}` : '';
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (isPlaying) { 
                timeElapsed++; 
                let m = Math.floor(timeElapsed / 60).toString().padStart(2, '0'); 
                let s = (timeElapsed % 60).toString().padStart(2, '0'); 
                timeDisplay.textContent = `${m}:${s}`; 
            }
        }, 1000);
    }

    function levelComplete() {
        isPlaying = false;
        clearInterval(gameLoop);
        
        const struct = sentenceStructures[currentLevel];
        const words = sentences[currentLevel];
        
        // 建立完整句子字串
        let fullText = "";
        words.forEach((w, i) => {
            let isPunctuation = (w === "." || w === "?" || w === "!");
            let prefix = (i === 0 || isPunctuation) ? "" : " ";
            fullText += prefix + w;
        });
        
        const renderSlot = (label, ch, colorClass, val) => {
            const isEmpty = val === "-";
            const valClass = isEmpty ? "text-slate-500 text-sm mt-1" : "text-sm text-white mt-1";
            const labelOpacity = isEmpty ? "opacity-40" : "opacity-100";
            return `<div class="flex flex-col items-center ${labelOpacity}">
                        <span class="${colorClass}">${ch}</span>
                        <span class="text-[9px] opacity-70">${label}</span>
                        <span class="${valClass}">${val}</span>
                    </div>`;
        };

        const svoptHtml = `
            <div class="overflow-x-auto w-full pb-2 mt-4 mb-4 flex justify-center text-white font-bold">
                <div class="bg-slate-800/60 p-4 rounded-lg border border-slate-700">
                   <div class="flex gap-3 sm:gap-4">
                      ${renderSlot('主角', 'S', 'text-green-400', struct[0])}
                      <div class="text-yellow-400 self-center">+</div>
                      ${renderSlot('動作', 'V', 'text-rose-400', struct[1])}
                      <div class="text-yellow-400 self-center">+</div>
                      ${renderSlot('對象', 'O', 'text-blue-400', struct[2])}
                      <div class="text-yellow-400 self-center">+</div>
                      ${renderSlot('地點', 'P', 'text-orange-400', struct[3])}
                      <div class="text-yellow-400 self-center">+</div>
                      ${renderSlot('時間', 'T', 'text-purple-400', struct[4])}
                   </div>
                </div>
            </div>
        `;
        
        overlayTitle.textContent = "太棒了！挑戰成功";
        overlayTitle.className = "text-3xl font-bold text-green-400 mb-2";
        
        // 顯示純文字完整句子，移除語音相關按鈕與標籤
        overlayMessage.innerHTML = `
            <div class="text-4xl sm:text-5xl font-black text-white mb-6 mt-4 tracking-wide text-center leading-normal drop-shadow-md">
                ${fullText}
            </div>
            ${svoptHtml}
        `;
        
        currentLevel++;
        
        // 按鈕先變成灰色，並禁止按下
        overlayBtn.disabled = true;
        overlayBtn.className = "bg-slate-500 text-slate-300 font-bold py-4 px-10 rounded-full shadow-lg text-xl cursor-not-allowed transition-colors duration-300";
        
        if (currentLevel >= sentences.length) {
            overlayBtn.innerHTML = "查看最後總分";
            overlayBtn.onclick = showScoreboard;
        } else {
            overlayBtn.innerHTML = "下一關 Next Level";
            overlayBtn.onclick = startReadyCountdown;
        }

        overlay.classList.remove('hidden');

        // 💥 修改：過關畫面出現後，連續讀出兩次句子，完成後才解鎖按鈕
        setTimeout(() => {
            speakSentence(fullText, () => {
                // 第一次唸完後，等待 0.8 秒
                setTimeout(() => {
                    speakSentence(fullText, () => {
                        // 第二次唸完後，恢復按鈕顏色並允許點擊
                        overlayBtn.disabled = false;
                        overlayBtn.className = "bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-10 rounded-full shadow-lg text-xl transition-transform active:scale-95";
                    });
                }, 800); 
            });
        }, 400); // 稍微延遲 0.4 秒讓最後一個單字的聲音順利唸完
    }

    function showScoreboard() {
        overlayTitle.textContent = "🎉 挑戰完成！";
        overlayTitle.className = "text-4xl font-bold text-yellow-400 mb-6";
        let m = Math.floor(timeElapsed / 60).toString().padStart(2, '0');
        let s = (timeElapsed % 60).toString().padStart(2, '0');
        
        overlayMessage.innerHTML = `
            <div class="bg-slate-800/80 p-6 rounded-2xl border-2 border-slate-600 w-full max-sm mx-auto mb-4">
                <h3 class="text-xl text-white mb-6 border-b border-slate-600 pb-3 font-bold">全部 6 關計時成績</h3>
                <div class="flex justify-between items-center mb-4 text-xl">
                    <span class="text-slate-300">⏱️ 總耗時：</span>
                    <span class="text-3xl font-bold text-blue-400">${m}:${s}</span>
                </div>
                <div class="flex justify-between items-center mb-2 text-xl">
                    <span class="text-slate-300">😵 總出錯：</span>
                    <span class="text-3xl font-bold text-rose-400">${mistakesCount} 次</span>
                </div>
                <div class="mt-4 text-green-400 font-bold">太棒了！你已經掌握了 SVOPT 結構！</div>
            </div>
        `;
        overlayBtn.innerHTML = "重新開始 Play Again";
        overlayBtn.onclick = showIntroPage1;
    }

    function update() {
        if (!isPlaying || isDizzy) return;
        dx = nextDx; dy = nextDy;
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };
        
        if (head.x < 0) head.x = GRID_SIZE - 1; else if (head.x >= GRID_SIZE) head.x = 0;
        if (head.y < 0) head.y = GRID_SIZE - 1; else if (head.y >= GRID_SIZE) head.y = 0;
        
        for (let i = 0; i < snake.length; i++) { 
            if (head.x === snake[i].x && head.y === snake[i].y) { 
                gameOver("小心！你撞到了自己的身體。"); 
                return; 
            } 
        }
        
        snake.unshift(head);
        let ateWord = false;
        for (let i = 0; i < wordsOnBoard.length; i++) {
            const wordObj = wordsOnBoard[i];
            if (head.y === wordObj.y && head.x >= wordObj.x && head.x < wordObj.x + wordObj.span) {
                if (wordObj.word === sentences[currentLevel][targetWordIndex]) {
                    speakWord(wordObj.word); // 💥 貪吃蛇吃下正確單字時發音
                    score += 10; 
                    scoreDisplay.textContent = score; 
                    targetWordIndex++; 
                    wordsOnBoard.splice(i, 1); 
                    ateWord = true; 
                    updateSentenceUI();
                    if (targetWordIndex === sentences[currentLevel].length) { 
                        levelComplete(); 
                        return; 
                    }
                } else {
                    mistakesCount++; 
                    snake.shift(); 
                    triggerDizzy(sentences[currentLevel][targetWordIndex]); 
                    return;
                }
                break;
            }
        }
        if (!ateWord) snake.pop();
        draw();
    }

    function draw() {
        ctx.fillStyle = '#a7f3d0'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#6ee7b7'; ctx.lineWidth = 1;
        for (let i = 0; i <= GRID_SIZE; i++) { 
            ctx.beginPath(); ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, canvas.height); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(canvas.width, i * CELL_SIZE); ctx.stroke(); 
        }
        wordsOnBoard.forEach(item => {
            const m = 2; 
            const bX = item.x * CELL_SIZE + m, bY = item.y * CELL_SIZE + m;
            const bW = item.span * CELL_SIZE - m * 2, bH = CELL_SIZE - m * 2;
            ctx.fillStyle = '#fef08a'; ctx.strokeStyle = '#eab308'; ctx.lineWidth = 2; 
            ctx.beginPath(); ctx.roundRect(bX, bY, bW, bH, 8); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#334155'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
            ctx.font = 'bold 16px "Nunito"'; 
            ctx.fillText(item.word, bX + bW / 2, bY + bH / 2);
        });
        snake.forEach((seg, idx) => {
            ctx.fillStyle = idx === 0 ? (isDizzy ? '#ef4444' : '#2563eb') : '#3b82f6'; 
            ctx.strokeStyle = '#1e3a8a'; ctx.lineWidth = 2; const m = 2;
            ctx.beginPath(); ctx.roundRect(seg.x * CELL_SIZE + m, seg.y * CELL_SIZE + m, CELL_SIZE - m * 2, CELL_SIZE - m * 2, idx === 0 ? 8 : 4); 
            ctx.fill(); ctx.stroke();
            if (idx === 0) {
                if (isDizzy) { 
                    ctx.strokeStyle = 'white'; ctx.lineWidth = 2; 
                    ctx.beginPath(); 
                    let cx = seg.x * CELL_SIZE + CELL_SIZE/2, cy = seg.y * CELL_SIZE + CELL_SIZE/2; 
                    ctx.moveTo(cx - 8, cy - 8); ctx.lineTo(cx - 2, cy - 2); 
                    ctx.moveTo(cx - 2, cy - 8); ctx.lineTo(cx - 8, cy - 2); 
                    ctx.stroke(); 
                } else { 
                    ctx.fillStyle = 'white'; ctx.beginPath(); 
                    ctx.arc(seg.x * CELL_SIZE + CELL_SIZE/2 - 6, seg.y * CELL_SIZE + CELL_SIZE/2 - 6, 3, 0, Math.PI*2); 
                    ctx.arc(seg.x * CELL_SIZE + CELL_SIZE/2 + 6, seg.y * CELL_SIZE + CELL_SIZE/2 - 6, 3, 0, Math.PI*2); 
                    ctx.fill(); 
                }
            }
        });
    }

    function startGame() {
        isPlaying = true;
        startTimer();
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(update, GAME_SPEED);
    }

    function gameOver(reason) {
        isPlaying = false; clearInterval(gameLoop); if (timerInterval) clearInterval(timerInterval);
        overlayTitle.textContent = "遊戲結束"; overlayTitle.className = "text-3xl font-bold text-rose-500 mb-4";
        overlayMessage.innerHTML = `<p class="text-white">${reason}</p><p class="text-sm text-slate-300 mt-4">別灰心，再試一次吧！</p>`;
        overlayBtn.innerHTML = "重新開始本關";
        overlayBtn.onclick = startReadyCountdown; 
        overlay.classList.remove('hidden');
    }

    function triggerDizzy(targetWord) {
        isDizzy = true; canvas.classList.add('shake-animation');
        const container = canvas.parentElement; 
        let msgDiv = document.getElementById('dizzyMsg') || document.createElement('div');
        msgDiv.id = 'dizzyMsg'; container.appendChild(msgDiv);
        msgDiv.className = 'absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-rose-600/95 text-white font-bold py-6 px-8 rounded-2xl shadow-2xl z-50 text-center pointer-events-none w-4/5';
        
        // 加入跳動的提示文字，提醒學生準備轉向
        msgDiv.innerHTML = `
            <span class="text-3xl sm:text-4xl block mb-4">😵 吃錯詞了！</span>
            <span class="text-lg sm:text-xl">請找 <span class="text-yellow-300 text-2xl underline">"${targetWord}"</span></span>
            <div class="mt-6 text-xl text-white bg-rose-800/50 py-2 rounded-lg border border-rose-400 animate-bounce">
                ⚠️ 準備轉彎！
            </div>
        `;
        draw();
        
        if (dizzyTimeout) clearTimeout(dizzyTimeout);
        dizzyTimeout = setTimeout(() => {
            // 倒數計時也加入提示文字
            msgDiv.className = 'absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-blue-600/95 text-white font-bold px-8 py-6 flex flex-col justify-center items-center rounded-2xl z-50 shadow-2xl pointer-events-none';
            let c = 3;
            const r = () => {
                if (c > 0) { 
                    msgDiv.innerHTML = `
                        <span class="text-7xl mb-2 drop-shadow-md">${c}</span>
                        <span class="text-xl text-yellow-300 animate-pulse">👇 快按方向鍵轉彎！</span>
                    `; 
                    c--; 
                    dizzyTimeout = setTimeout(r, 1000); 
                }
                else { canvas.classList.remove('shake-animation'); isDizzy = false; msgDiv.remove(); }
            };
            r();
        }, 1500);
    }

    function changeDirection(nx, ny) { 
        if (dx === 0 && nx !== 0) { nextDx = nx; nextDy = 0; } 
        else if (dy === 0 && ny !== 0) { nextDx = 0; nextDy = ny; } 
    }
    
    document.addEventListener('keydown', (e) => { 
        if (!isPlaying) return; 
        switch(e.key) { 
            case 'ArrowUp': case 'w': changeDirection(0, -1); break; 
            case 'ArrowDown': case 's': changeDirection(0, 1); break; 
            case 'ArrowLeft': case 'a': changeDirection(-1, 0); break; 
            case 'ArrowRight': case 'd': changeDirection(1, 0); break; 
        } 
    });
    
    const setupBtn = (id, nx, ny) => { 
        const b = document.getElementById(id); 
        const handler = (e) => { e.preventDefault(); changeDirection(nx, ny); }; 
        b.addEventListener('touchstart', handler, {passive: false}); 
        b.addEventListener('mousedown', handler); 
    };
    setupBtn('btnUp', 0, -1); setupBtn('btnDown', 0, 1); setupBtn('btnLeft', -1, 0); setupBtn('btnRight', 1, 0);

    showIntroPage1();
    draw();
</script>
</body>
